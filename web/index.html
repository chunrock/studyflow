<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>StudyFlow Overlay</title>
  <link rel="stylesheet" href="./styles/theme.css">
  <link rel="stylesheet" href="./styles/app.css">
</head>
<body>
  <main class="overlay-shell" aria-live="polite">
    <div class="screen-dim" data-role="dim"></div>
    <div class="highlight-ring" data-role="highlight"></div>
    <section class="callout" data-role="callout">
      <div class="callout__eyebrow" data-role="progress"></div>
      <h1 class="callout__title" data-role="title"></h1>
      <p class="callout__body" data-role="body"></p>
    </section>
    <nav class="controlbar" aria-label="교육 단계 컨트롤">
      <button class="controlbar__button" type="button" data-action="previous">이전</button>
      <button class="controlbar__button controlbar__button--primary" type="button" data-action="next">다음</button>
      <button class="controlbar__button" type="button" data-action="click-through">클릭 통과</button>
      <button class="controlbar__button" type="button" data-action="hide">숨김</button>
      <button class="controlbar__button" type="button" data-action="open">열기</button>
      <button class="controlbar__button" type="button" data-action="save">저장</button>
      <button class="controlbar__button" type="button" data-action="capture">화면 저장</button>
      <button class="controlbar__button" type="button" data-action="export-docx">Word</button>
      <button class="controlbar__button" type="button" data-action="export-pptx">PPT</button>
      <button class="controlbar__button" type="button" data-action="export-pdf">PDF</button>
    </nav>
    <aside class="editor-panel" data-role="editor">
      <div class="editor-panel__header">
        <strong>제작 모드</strong>
        <button type="button" data-editor-action="toggle">닫기</button>
      </div>
      <label class="editor-field">
        <span>단계 제목</span>
        <input type="text" data-editor-field="title">
      </label>
      <label class="editor-field">
        <span>설명</span>
        <textarea rows="4" data-editor-field="body"></textarea>
      </label>
      <div class="editor-grid">
        <label> X <input type="number" data-editor-field="x"></label>
        <label> Y <input type="number" data-editor-field="y"></label>
        <label> W <input type="number" data-editor-field="width"></label>
        <label> H <input type="number" data-editor-field="height"></label>
      </div>
      <button class="editor-save" type="button" data-editor-action="apply">현재 단계에 반영</button>
    </aside>
  </main>
  <script src="./scripts/scenario-schema.js"></script>
  <script src="./scripts/overlay-geometry.js"></script>
  <script src="./scripts/overlay-state.js"></script>
  <script src="./scripts/render.js"></script>
  <script src="./scripts/editor.js"></script>
  <script src="./scripts/capture.js"></script>
  <script src="./scripts/app.js"></script>
</body>
</html>
