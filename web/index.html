<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>StudyFlow Overlay</title>
  <link rel="stylesheet" href="./styles/theme.css">
  <link rel="stylesheet" href="./styles/app.css">
</head>
<body>
  <main class="overlay-shell" aria-live="polite">
    <div class="screen-dim" data-role="dim"></div>
    <div class="highlight-ring" data-role="highlight"></div>
    <section class="callout" data-role="callout">
      <div class="callout__eyebrow" data-role="progress"></div>
      <h1 class="callout__title" data-role="title"></h1>
      <p class="callout__body" data-role="body"></p>
    </section>
    <nav class="controlbar" aria-label="교육 단계 컨트롤">
      <button class="controlbar__button" type="button" data-action="previous">이전</button>
      <button class="controlbar__button controlbar__button--primary" type="button" data-action="next">다음</button>
      <button class="controlbar__button" type="button" data-action="click-through">클릭 통과</button>
      <button class="controlbar__button" type="button" data-action="hide">숨김</button>
    </nav>
  </main>
  <script src="./scripts/scenario-schema.js"></script>
  <script src="./scripts/overlay-geometry.js"></script>
  <script src="./scripts/overlay-state.js"></script>
  <script src="./scripts/render.js"></script>
  <script src="./scripts/app.js"></script>
</body>
</html>
